const SUPABASE_PUBLISHABLE_KEY='sb_publishable_hk1X6zDHZt_iVGED6pgrbA_dRHDuLT4';




async function syncSupabase(){
 try{
   const pseudo=getPseudo();
   const tag=localStorage.getItem(accKey('player_tag'))||'';

   const search=await fetch(
     SUPABASE_URL+'players?tag=eq.'+encodeURIComponent(tag)+'&select=id,pseudo,points,tag,wins,losses,best_score,best_win_streak,achievements',
     {headers:{'apikey':SUPABASE_PUBLISHABLE_KEY,'Authorization':'Bearer '+SUPABASE_PUBLISHABLE_KEY}}
   );

   const rows=await search.json();

   if(rows && rows.length>0){
      const id=rows[0].id;
      await fetch(SUPABASE_URL+'players?id=eq.'+id,{
        method:'PATCH',
        headers:{
          'apikey':SUPABASE_PUBLISHABLE_KEY,
          'Authorization':'Bearer '+SUPABASE_PUBLISHABLE_KEY,
          'Content-Type':'application/json'
        },
        body:JSON.stringify({pseudo:pseudo,points:points,tag:tag,wins:wins,losses:losses,best_score:bestScore,best_win_streak:bestWinStreak,achievements:achievements})
      });
   }else{
      await fetch(SUPABASE_URL+'players',{
        method:'POST',
        headers:{
          'apikey':SUPABASE_PUBLISHABLE_KEY,
          'Authorization':'Bearer '+SUPABASE_PUBLISHABLE_KEY,
          'Content-Type':'application/json',
          'Prefer':'return=minimal'
        },
        body:JSON.stringify({pseudo:pseudo,points:points,tag:tag,wins:wins,losses:losses,best_score:bestScore,best_win_streak:bestWinStreak,achievements:achievements})
      });
   }
 }catch(e){
   alert('❌ Erreur Sync : '+e.message);
 }
}

function renderUnits(){

Object.keys(allUnits).forEach(k=>{

 b.textContent=locked && k==='mole' ? '🔒 ??? 🟠 Légendaire' : (locked?'🔒 ':'')+allUnits[k].name+' '+(rarities[k]?rarities[k][0]+' '+rarities[k][1]:'')+' Lv.'+(levels[k]||1);

const ctx=canvas.getContext('2d');
let gold=30,enemyGold=30,score=0,selectedLane=0,gameOver=false,gameResult='';

let crystal=null, crystals=0; let floatingText=null; let moleIntroPlayed=false; let moleIntro=0;

const player={x:40,y:260,w:90,h:120,hp:1500,maxHp:1500};
const enemy={x:1070,y:260,w:90,h:120,hp:1500,maxHp:1500};

class Unit{
constructor(type,team,lane){
const base={
// Combattant équilibré (3)
knight:{hp:150,dmg:9,speed:1.6,range:30,color:'cyan'},

// Distance (4)
archer:{hp:70,dmg:6,speed:1.0,range:200,color:'yellow'},

// Tank (7)
giant:{hp:750,dmg:6,speed:0.40,range:35,color:'purple'},

// Boss volant (10)
dragon:{hp:450,dmg:22,speed:1.3,range:230,color:'red'},

// Défenseur (4)
guardian:{hp:300,dmg:5,speed:0.7,range:30,color:'steelblue'},

// Soutien (5)
healer:{hp:100,dmg:0,speed:1.15,range:90,color:'lime'},

// Mage (6)
mage:{hp:150,dmg:16,speed:1.0,range:180,color:'violet'},

// Sniper (7)
sniper:{hp:80,dmg:22,speed:0.8,range:320,color:'green'},

// Assassin (4)
ninja:{hp:80,dmg:14,speed:2.5,range:30,color:'white'},

// Suicide (4)
kamikaze:{hp:50,dmg:60,speed:1.9,range:30,color:'orange'},
electromancer:{hp:130,dmg:20,speed:1.0,range:180,color:'cyan'},
cryomancer:{hp:150,dmg:12,speed:1.0,range:260,color:'lightblue'},
pyromancer:{hp:120,dmg:18,speed:1.0,range:190,color:'orange'},
mole:{hp:900,dmg:50,speed:0.9,range:35,color:'black'}
}[type];

const lv=levels[type]||1;
this.hp=Math.round(base.hp*(1+0.05*(lv-1)));
this.maxHp=this.hp;
this.dmg=base.dmg*(1+0.05*(lv-1));
this.speed=base.speed; this.range=base.range; this.color=base.color;
this.type=type; this.team=team; this.lane=lane;
this.x=team==='player'?180:1020; this.y=lane?435:215; this.cool=0; this.burnTime=0; this.slowTime=0; this.electricTime=0; this.burrow=type==='mole'?120:0; this.burrowCd=360;
}
update(){
if(this.type==='mole'){
 if(this.burrow>0){
   this.burrow--;
   this.x += this.team==='player'?2.5:-2.5;

   let targets=unitsArr.filter(u=>u.team!==this.team && u.lane===this.lane);
   let priority=['healer','sniper','cryomancer','pyromancer','mage','electromancer'];
   targets.sort((a,b)=>{
      let pa=priority.indexOf(a.type); if(pa<0) pa=99;
      let pb=priority.indexOf(b.type); if(pb<0) pb=99;
      return pa-pb;
   });

   let near=targets.find(u=>Math.abs(u.x-this.x)<35);
   if(!near){
      let priorityTarget=targets.find(u=>Math.abs(u.x-this.x)<250);
      if(priorityTarget){
         this.x += (priorityTarget.x>this.x?5:-5);
      }
   }else{
      this.burrow=0;
   }

   if(this.burrow===0){
      unitsArr.forEach(u=>{
         if(u.team!==this.team && u.lane===this.lane && Math.abs(u.x-this.x)<60){u.hp-=130*(1+0.05*((levels['mole']||1)-1));}
      });
   }
   return;
 }
 this.burrowCd--;
 if(this.burrowCd<=0){ this.burrow=90; this.burrowCd=360; return; }
}
let target=unitsArr.find(u=>u!==this&&u.team!==this.team&&u.lane===this.lane&&Math.abs(u.x-this.x)<this.range);
if(this.type==='giant') target=null;

if(this.type==='healer'){
 const allies=unitsArr.filter(u=>
   u!==this &&
   u.team===this.team &&
   u.lane===this.lane &&
   u.hp>0 &&
   u.type!=='healer'
 );

 // Soins continus
 const healPower=0.28*(1+0.05*((levels['healer']||1)-1));
 allies.forEach(u=>{
   if(Math.abs(u.x-this.x)<80){
      u.hp=Math.min(u.maxHp,u.hp+healPower);
      for(let p=0;p<3;p++){
        ctx.fillStyle='lime';
        ctx.fillRect(u.x-10+Math.random()*20,u.y-20+Math.random()*20,2,2);

function spawn(type){
const cost=allUnits[type].cost;
if(gold<cost||gameOver)return;
gold-=cost;
if(type==='mole' && !moleIntroPlayed){
   moleIntroPlayed=true;
   moleIntro=300;
}
unitsArr.push(new Unit(type,'player',selectedLane));
}

let aiDifficulty=1;
function autoAIDifficulty(){
 if(points>=30000) return 10;
 if(points>=23000) return 9;
 if(points>=17000) return 8;
 if(points>=12000) return 7;
 if(points>=8000) return 6;
 if(points>=5000) return 5;
 if(points>=3000) return 4;
 if(points>=1500) return 3;
 if(points>=500) return 2;
 return 1;
}
let aiForced=false;
let currentAITeam=null;
let aiIndex=0;
let currentAIDeck=null;
const aiDecks=[
['mage','cryomancer','electromancer','pyromancer','knight','archer'],
['giant','healer','dragon','guardian','sniper','cryomancer'],
['mole','ninja','electromancer','pyromancer','guardian','dragon'],
['giant','guardian','healer','sniper','dragon','electromancer'],
['pyromancer','cryomancer','sniper','guardian','dragon','knight']
];
setInterval(()=>{
if(!gameOver){
 let aiLevel = aiForced ? aiDifficulty : autoAIDifficulty();

 const pools=[
 ['knight','archer','guardian','giant','dragon'],
 ['knight','archer','guardian','giant','dragon'],
 ['knight','archer','guardian','giant','dragon','mage'],
 ['knight','archer','guardian','giant','dragon','mage','electromancer'],
 ['knight','archer','guardian','giant','dragon','mage','electromancer','sniper','cryomancer'],
 ['knight','archer','guardian','giant','dragon','mage','electromancer','sniper','cryomancer','pyromancer','mole']
 ];
// IA élevée : préfère les unités rares et légendaires
if(aiLevel>=8){
  pools[4]=['dragon','electromancer','sniper','cryomancer','pyromancer','giant','mole'];
}
if(aiLevel>=10){
  pools[4]=['mole','dragon','electromancer','cryomancer','pyromancer','sniper'];
}
 const e=pools[Math.min(aiLevel-1,4)];
 let choice=e[Math.floor(Math.random()*e.length)];

 if(aiLevel>=8){
   if(!currentAIDeck){
      currentAIDeck=aiDecks[Math.floor(Math.random()*aiDecks.length)];
 moleIntroPlayed=false;
   }

   choice=currentAIDeck[Math.floor(Math.random()*currentAIDeck.length)];

   const playerDragons=unitsArr.filter(u=>u.team==='player' && u.type==='dragon').length;
   const playerHealers=unitsArr.filter(u=>u.team==='player' && u.type==='healer').length;

   if(playerDragons>=2 && currentAIDeck.includes('sniper')) choice='sniper';
   if(playerHealers>=2 && currentAIDeck.includes('mole')) choice='mole';
 }
 const cost=allUnits[choice]?.cost||3;

 let waves=Math.max(1,aiLevel-2);
 if(enemyGold>=cost){
   for(let n=0;n<waves;n++){
      if(enemyGold<cost) break;
      enemyGold-=cost;
      let u=new Unit(choice,'enemy',Math.random()<0.5?0:1);
      u.hp*=1+(Math.min(aiLevel,10)-1)*0.06;
      u.maxHp=u.hp;
      u.dmg*=1+(Math.min(aiLevel,10)-1)*0.06;
      unitsArr.push(u);
   }
 }
}
},2500);

if(!gameOver){
 gold=Math.min(200,gold+1);

function buyChest(cost){
 if(diamonds<cost){shopReward.innerHTML='❌ Pas assez de diamants';return;}
 diamonds-=cost;
 let reward='📦 ';
 let keys=Object.keys(levels);
 let u=keys[Math.floor(Math.random()*keys.length)];
 let gain;

 if(cost>=200){
   gain=2+Math.floor(Math.random()*4); // 2 à 5 niveaux garantis
 }else if(cost>=80){
   gain=1+Math.floor(Math.random()*3); // 1 à 3
 }else{
   gain=1; // minimum 1
 }

 levels[u]=(levels[u]||1)+gain;
 reward+=allUnits[u].name+' +'+gain+' niveaux ';
 // Chance spéciale Taupe
 if(!unlocked.includes('mole')){
   const moleChance = cost>=200 ? 0.02 : (cost>=80 ? 0.005 : 0);
   if(Math.random()<moleChance){
      unlocked.push('mole');
      levels['mole']=1;
      reward+=' 🪱 TAUPE LÉGENDAIRE DÉBLOQUÉE !';
   }
 }

 if(Math.random()<(cost>=200?0.9:0.4)){
   let locked=['mage','sniper','electromancer','cryomancer','pyromancer'].filter(x=>!unlocked.includes(x));
   if(locked.length){
      let nu=locked[Math.floor(Math.random()*locked.length)];
      unlocked.push(nu);
      levels[nu]=1;
      reward+=' 🆕 '+nu+' débloqué';
   }
 }
 shopReward.innerHTML=reward;
 saveGame();
 renderUnits();

}
