function ensurePseudo(){

   name='Joueur';
   localStorage.setItem(accKey('player_name'),name);

   localStorage.setItem(accKey('player_tag'),tag);
 }
}
function getPseudo(){

}

async function syncSupabase(){
 try{
   const pseudo=getPseudo();
   const tag=localStorage.getItem(accKey('player_tag'))||'';

   const search=await fetch(
     SUPABASE_URL+'players?tag=eq.'+encodeURIComponent(tag)+'&select=id,pseudo,points,tag,wins,losses,best_score,best_win_streak,achievements,diamonds,title',
     {headers:{'apikey':SUPABASE_PUBLISHABLE_KEY,'Authorization':'Bearer '+SUPABASE_PUBLISHABLE_KEY}}
   );

   const rows=await search.json();

   if(rows && rows.length>0){
      const id=rows[0].id;
      await fetch(SUPABASE_URL+'players?id=eq.'+id,{
        method:'PATCH',
        headers:{
          'apikey':SUPABASE_PUBLISHABLE_KEY,
          'Authorization':'Bearer '+SUPABASE_PUBLISHABLE_KEY,
          'Content-Type':'application/json'
        },
        body:JSON.stringify({pseudo:pseudo,points:points,diamonds:diamonds,tag:tag,wins:wins,losses:losses,best_score:bestScore,best_win_streak:bestWinStreak,achievements:achievements,title:getTitle(),league:getLeague()})
      });
   }else{
      await fetch(SUPABASE_URL+'players',{
        method:'POST',
        headers:{
          'apikey':SUPABASE_PUBLISHABLE_KEY,

constructor(type,team,lane){
const base={

}[type];

 lv=aiLvMap[Math.min(10,Math.max(1,aiLevel))]||1;
}
this.hp=Math.round(base.hp*(1+0.15*(lv-1)));

}
update(){
if(this.type==='mole'){
 if(this.burrow>0){
   this.burrow--;
   this.x += this.team==='player'?2.5:-2.5;

   let targets=unitsArr.filter(u=>u.team!==this.team && u.lane===this.lane);
   let priority=['healer','sniper','cryomancer','pyromancer','mage','electromancer'];
   targets.sort((a,b)=>{
      let pa=priority.indexOf(a.type); if(pa<0) pa=99;
      let pb=priority.indexOf(b.type); if(pb<0) pb=99;
      return pa-pb;
   });

   let near=targets.find(u=>Math.abs(u.x-this.x)<35);
   if(!near){
      let priorityTarget=targets.find(u=>Math.abs(u.x-this.x)<250);
      if(priorityTarget){
         this.x += (priorityTarget.x>this.x?5:-5);
      }
   }else{
      this.burrow=0;
   }

   if(this.burrow===0){
      unitsArr.forEach(u=>{
         if(u.team!==this.team && u.lane===this.lane && Math.abs(u.x-this.x)<60){u.hp-=130*(1+0.05*((this.level||1)-1));}
      });
   }
   return;
 }
 this.burrowCd--;
 if(this.burrowCd<=0){ this.burrow=90; this.burrowCd=360; return; }
}
if(this.type==='cavalier'){this.charge=Math.min((this.charge||0)+1,120);} 
// === CAVALIER CHARGE ===
if(this.type==='cavalier'){
  const dir=this.team==='player'?1:-1;
  const front=unitsArr.filter(u=>u.team!==this.team&&u.lane===this.lane&&u.hp>0&&(dir===1?(u.x>this.x&&u.x-this.x<350):(u.x<this.x&&this.x-u.x<350)));
  const closest=front.length>0?Math.min(...front.map(u=>Math.abs(u.x-this.x))):9999;
  if(closest>120) this.chargeSpeed=Math.min((this.chargeSpeed||this.speed)+0.03,this.speed*3.0);
  const contact=unitsArr.find(u=>u!==this&&u.team!==this.team&&u.lane===this.lane&&u.hp>0&&Math.abs(u.x-this.x)<this.range);
  if(contact){
    if(this.cool<=0){
      const sr=(this.chargeSpeed||this.speed)/this.speed;
      const dmg=Math.round(this.dmg*(1+(sr-1)*3.0));
      unitsArr.filter(u=>u.team!==this.team&&u.lane===this.lane&&u.hp>0&&Math.abs(u.x-this.x)<80).forEach(u=>{u.hp-=dmg;});
      this.chargeSpeed=this.speed; this.cool=20;
    }
  } else {
    const castle=this.team==='player'?enemy:player;
    if(Math.abs(this.x-(castle.x+45))<60&&this.cool<=0){
      const sr=(this.chargeSpeed||this.speed)/this.speed;
      castle.hp-=Math.round(10+(sr-1)/2*28);
      this.chargeSpeed=this.speed; this.cool=20;
    } else {
      const mv=this.slowTime>0?(this.chargeSpeed||this.speed)*0.6:(this.chargeSpeed||this.speed);
      this.x+=dir*mv;
    }
  }
  if(this.cool>0)this.cool--;
  if(this.slowTime>0)this.slowTime--;
  if(this.electricTime>0)this.electricTime--;
  if(this.burnTime>0){this.burnTime--;this.burnTick=(this.burnTick||0)+1;if(this.burnTick>=30){this.hp-=6;this.burnTick=0;}}
  return;
}
let target=unitsArr.find(u=>u!==this&&u.team!==this.team&&u.lane===this.lane&&Math.abs(u.x-this.x)<this.range);
if(this.type==='giant') target=null;

if(this.type==='healer'){
 const allies=unitsArr.filter(u=>
   u!==this &&
   u.team===this.team &&
   u.lane===this.lane &&
   u.hp>0 &&
   u.type!=='healer'
 );

 // Soins continus
 const healPower=0.28*(1+0.05*((this.level||1)-1));
 allies.forEach(u=>{
   if(Math.abs(u.x-this.x)<80){
      u.hp=Math.min(u.maxHp,u.hp+healPower);
      for(let p=0;p<3;p++){
        ctx.fillStyle='lime';
        ctx.fillRect(u.x-10+Math.random()*20,u.y-20+Math.random()*20,2,2);
      }
   }
 });

 // Suivi intelligent
 if(allies.length){
   // Ne considère que les alliés relativement proches
   let nearby = allies.filter(u=>Math.abs(u.x-this.x)<220);
   if(!nearby.length) nearby = allies.filter(u=>Math.abs(u.x-this.x)<400);
   if(!nearby.length) nearby = allies;

   let follow = nearby.reduce((a,b)=>{
      const score = u => {
        let s = 0;
        if(u.type==='guardian') s += 40;
        else if(u.type==='giant') s += 35;
        s += (1 - u.hp/u.maxHp) * 100; // plus blessé = priorité
        s -= Math.abs(u.x-this.x)/20;   // pénalité distance
        return s;
      };
      return score(a) > score(b) ? a : b;
   });

   const desired=this.team==='player' ? follow.x-70 : follow.x+70;

   // zone confortable : ne bouge pas inutilement
   if(this.x < desired-10) this.x += this.speed;
   else if(this.x > desired+10) this.x -= this.speed;
 }
}

if(this.type==='healer'){ target=null; }

if(target){





if(this.type==='cryomancer'){




   let enemies=unitsArr.filter(u=>
      u!==this &&
      u.team!==this.team &&
      u.lane===this.lane &&
      u.hp>0 &&
      Math.abs(u.x-this.x)<this.range
   );
   if(enemies.length){
      target=enemies.reduce((a,b)=>
        Math.abs(a.x-this.x) < Math.abs(b.x-this.x) ? a : b
      );
   }
 }
 if(this.cool<=0){
  if(this.type==='kamikaze'){target.hp-=this.dmg; this.hp=0;}
  else if(['archer','dragon','mage','sniper','electromancer','cryomancer','pyromancer'].includes(this.type)){projectiles.push({x:this.x,y:this.y,target,dmg:this.dmg,sourceType:this.type});}
  else if(this.dmg>0){ target.hp-=this.dmg; }
  this.cool=(this.type==='pyromancer'?12:20);
 }
}else {
 if(this.type!=='healer'){
   const moveSpeed=this.slowTime>0?this.speed*0.6:this.speed;
   this.x+=this.team==='player'?moveSpeed:-moveSpeed;
 }
}

const castle=this.team==='player'?enemy:player;
if(Math.abs(this.x-(castle.x+45))<60 && this.dmg>0 && this.cool<=0){
 if(this.type==='giant') castle.hp-=18;
 else if(this.type==='dragon') castle.hp-=14;
 else if(this.type==='sniper') castle.hp-=12;
 else if(this.type==='mage') castle.hp-=10;
 else if(this.type==='electromancer') castle.hp-=10;
 else if(this.type==='pyromancer') castle.hp-=10;
 else if(this.type==='ninja') castle.hp-=10;
 else if(this.type==='knight') castle.hp-=8;

 else if(this.type==='cryomancer') castle.hp-=3;
 else if(this.type==='mole') castle.hp-=14;
 else castle.hp-=this.dmg;
 this.cool=20;
}

if(this.slowTime>0){
 for(let i=0;i<4;i++){

 }
}


if(this.electricTime>0){
 for(let i=0;i<6;i++){

 }
}




if(this.burnTime>0){


 for(let i=0;i<6;i++){
   ctx.fillStyle=i%2?'orange':'red';

 if(this.burnTick>=30){

 }

if(this.slowTime>0){ this.slowTime--; }
if(this.electricTime>0){ this.electricTime--; }
if(this.cool>0)this.cool--;
}
draw(){
const t=this.type, x=this.x, y=this.y;
const dir=this.team==='player'?1:-1;
const tk=this.animTick||0;
const bob=Math.sin(tk*0.15)*2; // oscillation verticale douce
const attacking=this._attacking||false;
const dead=this.hp<=0;

ctx.save();
if(dir===-1){ctx.translate(x*2,0);ctx.scale(-1,1);}

if(t==='knight'||t==='guardian'){
  // Corps : armure bleue/grise
  const col=t==='guardian'?'#4a90d9':'#7a8fa0';
  const darkCol=t==='guardian'?'#2a60a0':'#4a6070';
  const legOff=Math.sin(tk*0.18)*5;
  // Jambes
  ctx.fillStyle=darkCol;
  ctx.fillRect(x-8, y+8+bob, 7, 14+legOff);
  ctx.fillRect(x+1, y+8+bob, 7, 14-legOff);
  // Corps
  ctx.fillStyle=col;
  ctx.fillRect(x-11, y-10+bob, 22, 22);
  // Épaules
  ctx.fillStyle=t==='guardian'?'#5aa0e9':'#8a9fb0';
  ctx.fillRect(x-15, y-10+bob, 6, 10);
  ctx.fillRect(x+9, y-10+bob, 6, 10);
  // Tête/casque
  ctx.fillStyle=col;
  ctx.fillRect(x-8, y-28+bob, 16, 18);
  // Visière
  ctx.fillStyle='#222';
  ctx.fillRect(x-5, y-22+bob, 10, 5);
  // Bouclier (guardian seulement)
  if(t==='guardian'){
    ctx.fillStyle='#2a60a0';
    ctx.fillRect(x-20, y-14+bob, 9, 20);
    ctx.fillStyle='#ffd700';
    ctx.fillRect(x-18, y-10+bob, 5, 5);
  }
  // Épée
  if(attacking){
    ctx.strokeStyle='#e0e0e0'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(x+12,y-5+bob); ctx.lineTo(x+30,y-20+bob); ctx.stroke();
    ctx.strokeStyle='#ffd700'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x+18,y-8+bob); ctx.lineTo(x+24,y-8+bob); ctx.stroke();
  } else {
    ctx.strokeStyle='#c0c0c0'; ctx.lineWidth=2;

function buildAIDeck(aiLevel){
 const units=Object.keys(allUnits).filter(u=>unitMeta[u]);
 let allowed=units.filter(u=>unitMeta[u].rarity==='common');
 if(aiLevel>=2) allowed.push(...units.filter(u=>unitMeta[u].rarity==='rare'));
 if(aiLevel>=4) allowed.push(...units.filter(u=>unitMeta[u].rarity==='epic'));
 if(aiLevel>=9) allowed.push(...units.filter(u=>unitMeta[u].rarity==='legendary'));
 allowed=[...new Set(allowed)];

 const deck=[];
 if(aiLevel>=2 && allowed.includes('cavalier')) deck.push('cavalier');
 const pick=(role)=>{
   const p=allowed.filter(u=>unitMeta[u].role===role && !deck.includes(u));
   if(p.length) deck.push(p[Math.floor(Math.random()*p.length)]);
 };
 pick('tank');
 pick('support');
 pick('offense');

 while(deck.length<6){
   const u=allowed[Math.floor(Math.random()*allowed.length)];
   if(!deck.includes(u)) deck.push(u);
 }
 return deck;
}

canvas.addEventListener('click',function(e){
 if(!gameOver) return;
 const r=canvas.getBoundingClientRect();
 const x=e.clientX-r.left;
 const y=e.clientY-r.top;

 if(x>=380 && x<=560 && y>=420 && y<=480){
   newGame();
 }

 if(x>=650 && x<=830 && y>=420 && y<=480){
   show('menu');
 }
});

function buyChest(cost,freeChest=false){
 if(!freeChest && diamonds<cost){shopReward.innerHTML='❌ Pas assez de diamants';return;}
 if(!freeChest) diamonds-=cost;
 let reward='📦 ';
 let keys=Object.keys(levels);
 let u=keys[Math.floor(Math.random()*keys.length)];
 let gain;

 if(cost>=200){
   gain=2+Math.floor(Math.random()*4); // 2 à 5 niveaux garantis
 }else if(cost>=80){
   gain=1+Math.floor(Math.random()*3); // 1 à 3
 }else{
   gain=1; // minimum 1
 }

 levels[u]=(levels[u]||1)+gain;
 reward+=allUnits[u].name+' +'+gain+' niveaux ';
 // Chance spéciale Taupe
 if(!unlocked.includes('mole')){
   const moleChance = cost>=200 ? 0.02 : (cost>=80 ? 0.005 : 0);
   if(Math.random()<moleChance){
      unlocked.push('mole');
      levels['mole']=1;
      reward+=' 🪱 TAUPE LÉGENDAIRE DÉBLOQUÉE !';
   }
 }

 // Déblocage Cavalier
 if(!unlocked.includes('cavalier') && cost>=80){
   const cavChance = cost>=200 ? 0.10 : 0.05;
   if(Math.random()<cavChance){
      unlocked.push('cavalier');
      levels['cavalier']=1;
      reward+=' 🏇 CAVALIER DÉBLOQUÉ !';
   }
 }

 if(Math.random()<(cost>=200?0.9:0.4)){
   let locked=['mage','sniper','electromancer','cryomancer','pyromancer'].filter(x=>!unlocked.includes(x));
   if(locked.length){
      let nu=locked[Math.floor(Math.random()*locked.length)];
      unlocked.push(nu);
      levels[nu]=1;
      reward+=' 🆕 '+nu+' débloqué';
   }
 }
 shopReward.innerHTML='✅ Achat effectué et sauvegardé !<br><br>'+reward;
 saveGame();
 renderUnits();

}
